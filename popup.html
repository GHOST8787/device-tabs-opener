<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>__MSG_extName__</title>
<style>
  :root {
    --bg: #faf3e8;
    --grid: rgba(45, 31, 24, 0.04);
    --surface: #ffffff;
    --hairline: #f0e5d0;
    --hairline-strong: #d8c9aa;
    --text: #2d1f18;
    --text-secondary: #6e5648;
    --text-tertiary: #a89786;

    --primary: #d65a3a;
    --primary-hover: #e26a4a;
    --primary-press: #b54725;
    --primary-soft: rgba(214, 90, 58, 0.10);

    --iphone-color: #6c4f7c;
    --iphone-soft: rgba(108, 79, 124, 0.12);
    --iphone-border: rgba(108, 79, 124, 0.22);

    --ipad-color: #c5854a;
    --ipad-soft: rgba(232, 167, 108, 0.16);
    --ipad-border: rgba(232, 167, 108, 0.36);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-feature-settings: "kern" 1, "liga" 1;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    width: 360px;
    min-height: 200px;
    max-height: 560px;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text",
                 "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--text);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    line-height: 1.45;
  }

  .header {
    padding: 14px 16px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--hairline);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .header-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: white;
    padding: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--hairline);
    box-shadow: 0 1px 2px rgba(45, 31, 24, 0.04);
    flex-shrink: 0;
  }
  .header-icon img { width: 100%; height: 100%; object-fit: contain; }
  .header-text { flex: 1; min-width: 0; }
  .header-eyebrow {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--text-tertiary);
    text-transform: uppercase;
    margin-bottom: 1px;
  }
  .header-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.015em;
    line-height: 1.2;
  }
  .lang-toggle {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    background: white;
    border: 1px solid var(--hairline-strong);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.04em;
    transition: border-color 0.15s, color 0.15s;
  }
  .lang-toggle:hover { border-color: var(--primary); color: var(--primary); }
  .lang-toggle:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

  #content {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    padding: 2px 6px 0 4px;
  }

  .device-card {
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--hairline);
    box-shadow: 0 1px 2px rgba(45, 31, 24, 0.03);
    overflow: hidden;
  }
  .device-header {
    padding: 11px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--hairline);
  }
  .device-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 1px solid;
    color: var(--ipad-color);
    background: var(--ipad-soft);
    border-color: var(--ipad-border);
  }
  .device-icon.iphone {
    color: var(--iphone-color);
    background: var(--iphone-soft);
    border-color: var(--iphone-border);
  }
  .device-info { flex: 1; min-width: 0; }
  .device-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .device-meta {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .select-toggle {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--primary);
    background: transparent;
    border: 1px solid var(--hairline-strong);
    cursor: pointer;
    padding: 4px 9px;
    border-radius: 5px;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .select-toggle:hover { background: var(--primary-soft); border-color: var(--primary); }
  .select-toggle:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

  .tab-list { padding: 4px 0 6px; }
  .tab-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .tab-item:hover { background: rgba(45, 31, 24, 0.025); }
  .tab-item:focus-visible { outline: 2px solid var(--primary); outline-offset: -2px; background: var(--primary-soft); }
  .tab-checkbox {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--hairline-strong);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    transition: background 0.15s, border-color 0.15s;
  }
  .tab-item.checked .tab-checkbox {
    background: var(--primary);
    border-color: var(--primary);
  }
  .tab-item.checked .tab-checkbox svg { opacity: 1; }
  .tab-checkbox svg { opacity: 0; color: white; transition: opacity 0.15s; }
  .tab-title {
    font-size: 12px;
    color: var(--text);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.005em;
  }

  /* Empty / error / loading states */
  .state {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 28px 20px;
    color: var(--text-tertiary);
  }
  .state-icon {
    width: 36px;
    height: 36px;
    margin-bottom: 10px;
    color: var(--hairline-strong);
  }
  .state-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .state-desc {
    font-size: 11px;
    color: var(--text-tertiary);
    line-height: 1.7;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--hairline);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    padding: 11px 12px 13px;
    background: var(--bg);
    border-top: 1px solid var(--hairline);
    flex-shrink: 0;
  }
  .primary-btn {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    background: var(--primary);
    color: white;
    transition: background 0.15s, transform 0.05s;
    letter-spacing: -0.005em;
    font-variant-numeric: tabular-nums;
    box-shadow: 0 2px 0 var(--primary-press);
  }
  .primary-btn:hover { background: var(--primary-hover); }
  .primary-btn:active { background: var(--primary-press); transform: translateY(1px); box-shadow: 0 1px 0 var(--primary-press); }
  .primary-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  .primary-btn:disabled {
    background: #d8c9aa;
    color: white;
    cursor: not-allowed;
    box-shadow: 0 2px 0 #b8a98a;
  }
  .primary-btn.success {
    background: #5d7a4e;
    box-shadow: 0 2px 0 #45603a;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--hairline-strong); border-radius: 3px; }
</style>
</head>
<body>
  <div class="header">
    <div class="header-icon"><img src="icons/icon128.png" alt=""></div>
    <div class="header-text">
      <div class="header-eyebrow" data-i18n="headerEyebrow">CHROME EXTENSION</div>
      <div class="header-title" data-i18n="headerTitle">裝置分頁</div>
    </div>
    <button class="lang-toggle" id="langToggle" type="button" aria-label="Toggle language">EN</button>
  </div>

  <div id="content">
    <div class="state">
      <div class="spinner"></div>
      <div class="state-title" data-i18n="loading">讀取中</div>
    </div>
  </div>

  <div class="footer" id="footer" style="display:none;">
    <button class="primary-btn" id="btnOpen" type="button" disabled>
      <span id="btnLabel">開啟選取的 0 個分頁</span>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
